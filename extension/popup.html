<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="header">
      <div>
        <div class="logo">24.7</div>
        <div class="subtitle">AUTOMATION</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">🔐 התחברות</div>
      <input type="email" class="manual-input" id="loginEmail" placeholder="אימייל" style="margin-bottom:8px">
      <input type="password" class="manual-input" id="loginPassword" placeholder="סיסמה">
      <div style="margin-top:10px;display:flex;gap:6px">
        <button class="btn btn-primary" id="loginBtn" style="flex:1">התחבר</button>
      </div>
      <div id="loginError" style="color:#ef4444;font-size:11px;margin-top:6px;display:none"></div>
      <div style="margin-top:10px;text-align:center">
        <a href="https://id-preview--a4864d2a-1e61-41be-922b-cb1366d595f8.lovable.app/auth" target="_blank" style="color:#00F0FF;font-size:11px;text-decoration:none">אין חשבון? הירשם כאן →</a>
      </div>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="mainScreen" style="display:none">
    <div class="header">
      <div>
        <div class="logo">24.7</div>
        <div class="subtitle">AUTOMATION</div>
      </div>
      <button class="btn" id="logoutBtn" style="margin-right:auto;font-size:10px;color:#64748b">יציאה</button>
    </div>

    <div class="status-bar">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="status-dot"></div>
        <span style="font-size:11px">סורק פעיל</span>
      </div>
      <span id="patternCount" style="font-size:11px;color:#00F0FF">0 דפוסים</span>
    </div>

    <!-- Alerts -->
    <div class="section" id="alertsSection" style="display:none">
      <div class="section-title">⚡ רצפים חוזרים</div>
      <div id="alertsList"></div>
    </div>

    <!-- Active Apps -->
    <div class="section">
      <div class="section-title">אפליקציות פעילות</div>
      <div id="appList" class="app-list">
        <div class="app-item" style="color:#475569;text-align:center;justify-content:center">טוען...</div>
      </div>
    </div>

    <!-- Per-Site Toggles -->
    <div class="section" id="sitesSection">
      <div class="section-title">🔒 פרטיות — אתרים</div>
      <div id="sitesList" class="app-list"></div>
    </div>

    <!-- Manual Mode -->
    <div class="section">
      <div class="section-title">🔧 מצב ידני</div>
      <textarea class="manual-input" id="manualInput" rows="3" placeholder="תאר קושי או משימה חוזרת..."></textarea>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn btn-primary" id="suggestBtn">💡 קבל המלצה</button>
        <button class="btn btn-primary" id="dashboardBtn">📊 דשבורד</button>
      </div>
      <div id="aiResult" style="display:none;margin-top:10px"></div>
    </div>

    <div class="footer">
      <a href="https://id-preview--a4864d2a-1e61-41be-922b-cb1366d595f8.lovable.app" target="_blank">פתח דשבורד מלא →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
